name: LilFella
options:
  bundleIdPrefix: com.lilfella
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  LilFella:
    type: application
    platform: iOS
    sources:
      - path: LilFella
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lilfella.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: LilFella
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_ENTITLEMENTS: LilFella/LilFella.entitlements
    dependencies:
      - framework: Frameworks/llama.xcframework
        embed: true

  LilFellaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LilFellaTests
    dependencies:
      - target: LilFella
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lilfella.tests
        GENERATE_INFOPLIST_FILE: "YES"
